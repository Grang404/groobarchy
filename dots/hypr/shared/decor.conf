general {
    gaps_in = 0
    gaps_out = 0
    border_size = 1
    col.active_border = rgba(757581ff)
    col.inactive_border = rgba(2a2a2dff)
    resize_on_border = true
    allow_tearing = false
    layout = hy3
}

decoration {
    rounding = 0
    rounding_power = 0
    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    blur {
        enabled = true
        ignore_opacity = true
        size = 5
        passes = 1
        vibrancy = 0.1696
    }
}
