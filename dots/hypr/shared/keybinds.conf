$terminal = ghostty
$browser = firefox

bind = SUPER, RETURN, exec, $terminal # Terminal
bind = SUPER, B, exec, $browser # Browser
bind = SUPER, R, exec, groobofi # App Menu
bind = SUPER, X, exec, groob-keybinds # Keybinds
bind = SUPER, I, exec, groob-wallpaper # Wallpaper Picker
bind = SUPER ALT, I, exec, groob-randompaper # Random Wallpaper
bind = SUPER, P, exec, hyprshot -m region --clipboard-only # Screenshot Region
bind = SUPER CONTROL, P, exec, hyprshot -m output --clipboard-only # Screenshot screen
bind = SUPER, L, exec, hyprlock # Lock Screen
bind = CONTROL ALT, X, exec, hyprpicker -a # Color Picker


# Workspaces
bind = SUPER, mouse_down, workspace, e+1 # Scroll Down Workspaces
bind = SUPER, mouse_up, workspace, e-1 # Scroll Up Workpaces
bind = SUPER, S, togglespecialworkspace, magic # Spoopy magic workspace
bind = SUPER SHIFT, S, movetoworkspace, special:magic # Move to Spoopyspace

# Window Manipulation
bind = SUPER, V, togglefloating # Toggle Floating
bind = SUPER, D, layoutmsg, togglesplit # Toggle Split
bind = SUPER, F, fullscreen # Toggle Fullscreen
bind = SUPER, M, fullscreen, 1 # Toggle Fake Fullscreen
bind = SUPER, T, alterzorder, top # Move Window to Top
bind = SUPER, C, killactive, # Kill Window

# Navigate windows
bind = CONTROL, j, movefocus, l # Move Focus Left
bind = CONTROL, k, movefocus, r # Move Focus Right
bind = CONTROL, h, movefocus, u # Move Focus Up
bind = CONTROL, l, movefocus, d # Move Focus Down

# Move windows
bind = CONTROL SHIFT, j, movewindow, l # Move Window Left
bind = CONTROL SHIFT, k, movewindow, r # Move Window Right
bind = CONTROL SHIFT, h, movewindow, u # Move Window Up
bind = CONTROL SHIFT, l, movewindow, d # Move Window Down

# Bring focus to top for floating windows
bind = CONTROL, h, alterzorder, top # Ignore
bind = CONTROL, l, alterzorder, top # Ignore
bind = CONTROL, k, alterzorder, top # Ignore
bind = CONTROL, j, alterzorder, top # Ignore


# Mouse keybinds
bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous
