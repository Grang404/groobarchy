dwindle {
    pseudotile = true
    preserve_split = true
    force_split = 2
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = 0 # Set to 0 or 1 to disable the weeb shit
    disable_hyprland_logo = true
}

ecosystem {
    no_update_news = true
    no_donation_nag = true

}

$hypr = ~/.config/hypr

source = $hypr/env.conf
source = $hypr/autostart.conf
source = $hypr/monitors.conf
source = $hypr/devices.conf
source = $hypr/keybinds.conf

source = $hypr/workspaces.conf
source = $hypr/device-keybinds.conf
source = $hypr/hy3.conf
source = $hypr/animations.conf
source = $hypr/decor.conf
source = $hypr/rules.conf

